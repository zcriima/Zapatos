<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CATÁLOGO</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body{
    background-image: linear-gradient(rgba(255,255,255,0.55), rgba(255,255,255,0.55)), url('images/fondo.jpg');
    background-size: cover;
    background-position: center top;
    background-repeat: no-repeat;
    background-attachment: scroll;
    min-height: 100vh;
  }
  .product-card{
    background: rgba(255,255,255,0.18);
    backdrop-filter: blur(7px);
    border: 1px solid rgba(255,255,255,0.45);
  }
  .product-image{
    cursor: pointer;
    transition: transform .25s ease;
  }
  .product-image:hover{ transform: scale(1.03); }
  .image-frame{ overflow: hidden; }
  body.modal-open{ overflow: hidden; }
</style>
</head>
<body class="text-gray-900">

<header class="header-shell">
  <div class="max-w-6xl mx-auto px-4 py-1 text-center">

    <img 
      src="images/logo.png" 
      alt="FG Store"
      class="mx-auto mb-2"
      style="max-height:300px;"
    >
    </div>
</header>

<section class="max-w-6xl mx-auto px-4 py-6">
  <div id="filters" class="flex gap-2 justify-center flex-wrap mb-6"></div>
  <div id="products" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6"></div>
</section>

<a id="whatsappFloat"
   class="fixed bottom-5 right-5 z-30 w-14 h-14 flex items-center justify-center bg-green-500 text-white rounded-full shadow-xl"
   target="_blank" aria-label="WhatsApp">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="currentColor" class="w-7 h-7">
    <path d="M19.11 17.23c-.27-.13-1.58-.78-1.82-.87-.24-.09-.42-.13-.6.13-.18.27-.69.87-.85 1.05-.16.18-.31.2-.58.07-.27-.13-1.12-.41-2.13-1.31-.79-.7-1.32-1.57-1.47-1.84-.16-.27-.02-.41.11-.54.11-.11.27-.29.4-.43.13-.15.18-.25.27-.42.09-.18.04-.33-.02-.47-.07-.13-.6-1.45-.82-1.98-.22-.53-.44-.46-.6-.47h-.51c-.18 0-.47.07-.71.33-.24.27-.93.91-.93 2.22 0 1.31.96 2.58 1.09 2.76.13.18 1.88 2.87 4.55 4.02.64.27 1.13.43 1.52.55.64.2 1.22.17 1.68.1.51-.08 1.58-.64 1.8-1.25.22-.62.22-1.15.16-1.25-.07-.11-.24-.18-.51-.31Z"/>
    <path d="M16.03 3C8.84 3 3 8.73 3 15.79c0 2.47.72 4.77 1.96 6.72L3.68 29l6.7-1.75a13.15 13.15 0 0 0 5.65 1.27h.01C23.2 28.52 29 22.79 29 15.73 29 8.67 23.2 3 16.03 3Zm0 23.26h-.01a10.9 10.9 0 0 1-5.56-1.52l-.4-.24-3.97 1.03 1.06-3.86-.26-.4a10.64 10.64 0 0 1-1.64-5.62c0-5.93 4.84-10.75 10.79-10.75 2.88 0 5.59 1.11 7.63 3.13a10.61 10.61 0 0 1 3.17 7.57c0 5.93-4.84 10.76-10.8 10.76Z"/>
  </svg>
</a>

<div id="imageModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/75 p-4">
  <div class="relative w-full max-w-4xl">
    <button id="closeModal" class="absolute -top-3 right-0 rounded-full bg-white px-3 py-1 text-2xl font-bold text-gray-700 shadow">×</button>
    <div class="overflow-hidden rounded-2xl bg-white shadow-2xl">
      <img id="modalImage" src="" alt="Vista ampliada" class="max-h-[85vh] w-full object-contain bg-white">
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
