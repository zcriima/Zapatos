<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CATÁLOGO</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  html { scroll-behavior: smooth; }
  body.modal-open { overflow: hidden; }
</style>
</head>

<body class="bg-gray-50 text-gray-900">

<header class="sticky top-0 bg-white border-b z-40">
  <div class="max-w-6xl mx-auto px-4 py-4 text-center">
    <h1 class="text-2xl font-bold tracking-wide">CATÁLOGO</h1>
  </div>
</header>

<section class="max-w-6xl mx-auto px-4 py-6">
  <div id="filters" class="flex gap-2 justify-center flex-wrap mb-6"></div>
  <div id="products" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-5"></div>
</section>

<a id="whatsappFloat"
class="fixed bottom-5 right-5 w-14 h-14 flex items-center justify-center bg-green-500 text-white rounded-full shadow-xl"
target="_blank" aria-label="WhatsApp">
💬
</a>

<div id="imageModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/75 p-4">
  <div class="relative w-full max-w-3xl">
    <button id="closeModal"
      class="absolute -top-2 right-0 rounded-full bg-white px-3 py-1 text-xl font-bold text-gray-700 shadow">
      ×
    </button>
    <div class="overflow-hidden rounded-2xl bg-white shadow-2xl">
      <img id="modalImage" src="" alt="Vista ampliada" class="max-h-[85vh] w-full object-contain bg-white">
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
